server:
  port: 7000
  servlet:
    context-path: /miniapp

spring:
  application:
    name: miniapp-scaffold
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/miniapp_dev
    username: postgres
    password: ${DB_PASSWORD:postgres}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.nzhk.miniapp

# 小程序通用配置
miniapp:
  jwt:
    secret: ${MINIAPP_JWT_SECRET:miniapp-jwt-secret-change-in-prod}
  wechat:
    appid: ${MINIAPP_WECHAT_APPID:}
    secret: ${MINIAPP_WECHAT_SECRET:}
